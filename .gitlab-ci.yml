stages:
  - build
  - test
  - lint
  - docker
  - deploy

variables:
  APP_NAME: "online-store-watches"
  NEXT_PUBLIC_DB_URL: $NEXT_PUBLIC_DB_URL
  NEXT_PUBLIC_DB_NAME: $NEXT_PUBLIC_DB_NAME
  NEXT_PUBLIC_ACCESS_TOKEN_KEY: $NEXT_PUBLIC_ACCESS_TOKEN_KEY
  NEXT_PUBLIC_REFRESH_TOKEN_KEY: $NEXT_PUBLIC_REFRESH_TOKEN_KEY
  NEXT_PUBLIC_NODEMAILER_PW: $NEXT_PUBLIC_NODEMAILER_PW
  NEXT_PUBLIC_NODEMAILER_EMAIL: $NEXT_PUBLIC_NODEMAILER_EMAIL
  NEXT_PUBLIC_FIREBASE_API_KEY: $NEXT_PUBLIC_FIREBASE_API_KEY
  NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: $NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
  NEXT_PUBLIC_FIREBASE_PROJECT_ID: $NEXT_PUBLIC_FIREBASE_PROJECT_ID
  NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: $NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
  NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: $NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
  NEXT_PUBLIC_FIREBASE_APP_ID: $NEXT_PUBLIC_FIREBASE_APP_ID


shop_build:
  stage: build
  tags:
    - student
  timeout: 20 minutes
  script:
    - cd shop
    - |
      cat > .env << EOF
      NEXT_PUBLIC_DB_URL=${NEXT_PUBLIC_DB_URL}
      NEXT_PUBLIC_DB_NAME=${NEXT_PUBLIC_DB_NAME}
      NEXT_PUBLIC_ACCESS_TOKEN_KEY=${NEXT_PUBLIC_ACCESS_TOKEN_KEY}
      NEXT_PUBLIC_REFRESH_TOKEN_KEY=${NEXT_PUBLIC_REFRESH_TOKEN_KEY}
      NEXT_PUBLIC_NODEMAILER_PW=${NEXT_PUBLIC_NODEMAILER_PW}
      NEXT_PUBLIC_NODEMAILER_EMAIL=${NEXT_PUBLIC_NODEMAILER_EMAIL}
      NEXT_PUBLIC_FIREBASE_API_KEY=${NEXT_PUBLIC_FIREBASE_API_KEY}
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}
      NEXT_PUBLIC_FIREBASE_PROJECT_ID=${NEXT_PUBLIC_FIREBASE_PROJECT_ID}
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET}
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID}
      NEXT_PUBLIC_FIREBASE_APP_ID=${NEXT_PUBLIC_FIREBASE_APP_ID}
      EOF
    - npm ci
    - npm run build
  artifacts:
    paths:
      - shop/.next/
    expire_in: 1 hour
  rules:
    - if: '$CI_COMMIT_BRANCH'

admin_build:
  stage: build
  tags:
    - student
  timeout: 20 minutes
  script:
    - cd admin/test-admin
    - yarn install --frozen-lockfile
    - yarn build
  artifacts:
    paths:
      - admin/test-admin/dist/
    expire_in: 1 hour
  rules:
    - if: '$CI_COMMIT_BRANCH'


shop_test:
  stage: test
  tags:
    - student
  script:
    - cd shop
    - npm ci
    - npm run test:ci
  coverage: '/Lines\s*:\s*(\d+\.?\d*)%/'
  artifacts:
    paths:
      - shop/coverage/
    expire_in: 3 days
  rules:
    - if: '$CI_COMMIT_BRANCH'

admin_test:
  stage: test
  tags:
    - student
  script:
    - cd admin/test-admin
    - yarn install --frozen-lockfile
    - yarn add @testing-library/dom --dev
    - yarn test:ci
  allow_failure: true
  rules:
    - if: '$CI_COMMIT_BRANCH'

shop_security:
  stage: test
  tags:
    - student
  script:
    - cd shop
    - npm audit --audit-level=critical
  allow_failure: true
  rules:
    - if: '$CI_COMMIT_BRANCH'

admin_security:
  stage: test
  tags:
    - student
  script:
    - cd admin/test-admin
    - npm audit --audit-level=critical
  allow_failure: true
  rules:
    - if: '$CI_COMMIT_BRANCH'


shop_lint:
  stage: lint
  tags:
    - student
  script:
    - cd shop
    - npm ci
    - npx eslint . --ext .js,.jsx,.ts,.tsx --max-warnings=100 --ignore-pattern node_modules --ignore-pattern .next
  allow_failure: true
  rules:
    - if: '$CI_COMMIT_BRANCH'

admin_lint:
  stage: lint
  tags:
    - student
  script:
    - cd admin/test-admin
    - yarn install --frozen-lockfile
    - npx eslint src/ --ext .js,.jsx,.ts,.tsx --max-warnings=100
  allow_failure: true
  rules:
    - if: '$CI_COMMIT_BRANCH'

docker_shop:
  stage: docker
  image: docker:24
  tags:
    - student
  script:
    - cd shop
    - |
      docker build \
        --build-arg NEXT_PUBLIC_DB_URL="${NEXT_PUBLIC_DB_URL}" \
        --build-arg NEXT_PUBLIC_DB_NAME="${NEXT_PUBLIC_DB_NAME}" \
        --build-arg NEXT_PUBLIC_ACCESS_TOKEN_KEY="${NEXT_PUBLIC_ACCESS_TOKEN_KEY}" \
        --build-arg NEXT_PUBLIC_REFRESH_TOKEN_KEY="${NEXT_PUBLIC_REFRESH_TOKEN_KEY}" \
        --build-arg NEXT_PUBLIC_NODEMAILER_PW="${NEXT_PUBLIC_NODEMAILER_PW}" \
        --build-arg NEXT_PUBLIC_NODEMAILER_EMAIL="${NEXT_PUBLIC_NODEMAILER_EMAIL}" \
        --build-arg NEXT_PUBLIC_FIREBASE_API_KEY="${NEXT_PUBLIC_FIREBASE_API_KEY}" \
        --build-arg NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN="${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}" \
        --build-arg NEXT_PUBLIC_FIREBASE_PROJECT_ID="${NEXT_PUBLIC_FIREBASE_PROJECT_ID}" \
        --build-arg NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET="${NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET}" \
        --build-arg NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID="${NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID}" \
        --build-arg NEXT_PUBLIC_FIREBASE_APP_ID="${NEXT_PUBLIC_FIREBASE_APP_ID}" \
        -t shop-watches:$CI_COMMIT_SHORT_SHA .
    - docker tag shop-watches:$CI_COMMIT_SHORT_SHA shop-watches:latest
    - docker images | grep shop-watches
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'

docker_admin:
  stage: docker
  image: docker:24
  tags:
    - student
  script:
    - cd admin/test-admin
    - docker build -t admin-watches:$CI_COMMIT_SHORT_SHA .
    - docker tag admin-watches:$CI_COMMIT_SHORT_SHA admin-watches:latest
    - docker images | grep admin-watches
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'

deploy_staging:
  stage: deploy
  tags:
    - student
  needs:
    - job: docker_shop
    - job: docker_admin
  script:
    - echo "═══════════════════════════════════════"
    - echo "  DEPLOYING Online Store of Watches"
    - echo "  Branch  $CI_COMMIT_BRANCH"
    - echo "  Commit  $CI_COMMIT_SHORT_SHA"
    - echo "  Time    $(date '+%Y-%m-%d %H:%M:%S')"
    - echo "  shop-watches:$CI_COMMIT_SHORT_SHA"
    - echo "  admin-watches:$CI_COMMIT_SHORT_SHA"
    - echo "  Status  SUCCESS"
    - echo "═══════════════════════════════════════"
  environment:
    name: staging
    url: https://royal-tick-mu.vercel.app/
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: always