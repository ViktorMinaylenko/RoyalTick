stages:
  - .pre
  - build
  - test
  - lint
  - docker
  - deploy

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""
  NODE_IMAGE: node:20-alpine
  DOCKER_IMAGE: docker:latest

# Шаблон для економії місця (DRY)
.common_setup:
  image: $NODE_IMAGE
  tags: [student]
  cache:
    key:
      files:
        - shop/package-lock.json
        - admin/test-admin/yarn.lock
    paths:
      - shop/node_modules/
      - admin/test-admin/node_modules/
    policy: pull-push

# Попередня перевірка середовища
check_env:
  stage: .pre
  extends: .common_setup
  script:
    - node -v
    - npm -v

# Збірка Shop (Next.js)
shop_build:
  stage: build
  extends: .common_setup
  script:
    - cd shop
    - npm ci  # Швидше за install у CI
    - npm run build
  artifacts:
    paths:
      - shop/.next/
      - shop/public/
    expire_in: 2 hours
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
    - if: '$CI_COMMIT_BRANCH == "main"'

# Збірка Admin (Vite/React)
admin_build:
  stage: build
  extends: .common_setup
  script:
    - cd admin/test-admin
    - yarn install --frozen-lockfile
    - yarn build
  artifacts:
    paths:
      - admin/test-admin/dist/
    expire_in: 2 hours
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
    - if: '$CI_COMMIT_BRANCH == "main"'

# Паралельне тестування
.test_template:
  stage: test
  extends: .common_setup
  allow_failure: false

shop_test:
  extends: .test_template
  script:
    - cd shop
    - npm run test:ci || echo "No tests defined"

admin_test:
  extends: .test_template
  script:
    - cd admin/test-admin
    - yarn test:ci || echo "No tests defined"

# Лінтер (не зупиняє пайплайн, але звітує)
lint_all:
  stage: lint
  extends: .common_setup
  script:
    - cd shop && npx eslint . --max-warnings=100 || true
    - cd ../admin/test-admin && npx eslint src/ --max-warnings=100 || true
  allow_failure: true

# Docker з використанням кешу шарів
.docker_template:
  stage: docker
  image: $DOCKER_IMAGE
  services:
    - docker:dind
  tags: [student]
  before_script:
    - docker info
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'

docker_shop:
  extends: .docker_template
  script:
    - cd shop
    - docker build --cache-from shop-watches:latest -t shop-watches:$CI_COMMIT_SHORT_SHA -t shop-watches:latest .

docker_admin:
  extends: .docker_template
  script:
    - cd admin/test-admin
    - docker build --cache-from admin-watches:latest -t admin-watches:$CI_COMMIT_SHORT_SHA -t admin-watches:latest .

# Деплой (Staging vs Production)
deploy_staging:
  stage: deploy
  image: alpine:latest
  tags: [student]
  environment:
    name: staging
  script:
    - echo "Deploying $CI_COMMIT_SHORT_SHA to STAGING..."
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'
      when: manual

deploy_production:
  stage: deploy
  image: alpine:latest
  tags: [student]
  environment:
    name: production
  script:
    - echo "Deploying $CI_COMMIT_SHORT_SHA to PRODUCTION..."
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: always