stages:
  - build
  - test
  - lint
  - docker
  - deploy

variables:
  APP_NAME: "online-store-watches"


shop_build:
  stage: build
  # ВИДАЛЕНО tags: [student] — якщо Instance runner без цього тегу, job висить вічно
  # Якщо твій runner МАЄ тег student — поверни цей рядок назад
  timeout: 20 minutes
  script:
    - cd shop
    - npm ci                   
    - npm run build
  artifacts:
    paths:
      - shop/.next/
    expire_in: 1 hour
  rules:
    - if: '$CI_COMMIT_BRANCH'

admin_build:
  stage: build
  timeout: 20 minutes
  script:
    - cd admin/test-admin
    - yarn install --frozen-lockfile
    - yarn build
  artifacts:
    paths:
      - admin/test-admin/dist/
    expire_in: 1 hour
  rules:
    - if: '$CI_COMMIT_BRANCH'


shop_test:
  stage: test
  script:
    - cd shop
    - npm ci
    - npm run test:ci
  coverage: '/Lines\s*:\s*(\d+\.?\d*)%/' 
  artifacts:
    paths:
      - shop/coverage/    
    expire_in: 3 days
  rules:
    - if: '$CI_COMMIT_BRANCH'

admin_test:
  stage: test
  script:
    - cd admin/test-admin
    - yarn install --frozen-lockfile
    - yarn test:ci
  rules:
    - if: '$CI_COMMIT_BRANCH'

shop_security:
  stage: test
  script:
    - cd shop
    - npm audit --audit-level=high
  allow_failure: true
  rules:
    - if: '$CI_COMMIT_BRANCH'

admin_security:
  stage: test
  script:
    - cd admin/test-admin
    - npm audit --audit-level=high
  allow_failure: true
  rules:
    - if: '$CI_COMMIT_BRANCH'


shop_lint:
  stage: lint
  script:
    - cd shop
    - npm ci
    - npx eslint . --ext .js,.jsx,.ts,.tsx --max-warnings=100 --ignore-pattern node_modules --ignore-pattern .next
  allow_failure: true
  rules:
    - if: '$CI_COMMIT_BRANCH'

admin_lint:
  stage: lint
  script:
    - cd admin/test-admin
    - yarn install --frozen-lockfile
    - npx eslint src/ --ext .js,.jsx,.ts,.tsx --max-warnings=100
  allow_failure: true
  rules:
    - if: '$CI_COMMIT_BRANCH'


docker_shop:
  stage: docker
  script:
    - cd shop
    - docker build -t shop-watches:$CI_COMMIT_SHORT_SHA .
    - docker tag shop-watches:$CI_COMMIT_SHORT_SHA shop-watches:latest 
    - docker images | grep shop-watches
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'

docker_admin:
  stage: docker
  script:
    - cd admin/test-admin
    - docker build -t admin-watches:$CI_COMMIT_SHORT_SHA .
    - docker tag admin-watches:$CI_COMMIT_SHORT_SHA admin-watches:latest
    - docker images | grep admin-watches
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'

deploy_staging:
  stage: deploy
  needs:
    - job: docker_shop
    - job: docker_admin
  script:
    - echo "═══════════════════════════════════════"
    - echo "  DEPLOYING Online Store of Watches"
    - echo "  Branch  $CI_COMMIT_BRANCH"
    - echo "  Commit  $CI_COMMIT_SHORT_SHA"
    - echo "  Time    $(date '+%Y-%m-%d %H:%M:%S')"
    - echo "  shop-watches:$CI_COMMIT_SHORT_SHA"
    - echo "  admin-watches:$CI_COMMIT_SHORT_SHA"
    - echo "  Status  SUCCESS"
    - echo "═══════════════════════════════════════"
  environment:
    name: staging
    url: https://royal-tick-mu.vercel.app/
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: always